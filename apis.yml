aid: amazon-entity-resolution
name: Amazon Entity Resolution
description: >-
  Amazon Entity Resolution is a service that helps you match and link related
  records across multiple applications, channels, and data stores. It uses
  machine learning and configurable matching techniques to identify and
  consolidate records that refer to the same entity, such as a customer or
  product.
